<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toprak Doruklu</title>
    <meta name="description" content="Toprak Doruklu Kişisel Sayfası">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #082f49 0%, #020617 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-secondary: #bae6fd;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }

        .blob-1 { top: -10%; left: 0%; width: 40vw; height: 40vw; background: #0284c7; border-radius: 50%; }
        .blob-2 { bottom: -10%; right: 10%; width: 45vw; height: 45vw; background: #0369a1; border-radius: 50%; animation-delay: -5s; }

        .container {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 4rem 5rem;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: slideUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.4s ease;
        }

        .container:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px -10px rgba(0,0,0,0.6);
            transform: translateY(-5px);
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 0.5rem 0;
            font-weight: 700;
            background: linear-gradient(to right, #7dd3fc, #e0f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin: 0 0 2rem 0;
            font-weight: 300;
        }
        
        .badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.2);
            border-radius: 9999px;
            color: #38bdf8;
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0% { transform: translateY(0px) scale(1); } 100% { transform: translateY(30px) scale(1.05); } }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="container">
        <h1>Toprak Doruklu</h1>
        <p>Gelecek burada inşa edilecek.</p>
        <div class="badge">Hazırlanıyor</div>
    </div>
</body>
</html>
