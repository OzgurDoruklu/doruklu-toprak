<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toprak Doruklu - Bilgi Kartı Oyunu</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.doruklu.com/style.css">
    <style>
        body { padding-top: 80px; }
        .score-box {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 700;
            color: #818cf8;
        }
    </style>
</head>
<body>
    <div id="alert-box" class="alert"></div>
    <div id="loading-spinner" class="loading-overlay"><div class="spinner"></div></div>

    <div id="game-screen" class="screen">
        <div class="dashboard-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                <div style="display:flex; align-items:center; gap:12px;">
                    <span class="badge success">Oyuncu</span>
                    <span id="player-name" style="font-weight:700; font-size:1.1rem; color:white;">--</span>
                </div>
                <div class="score-box">
                    SKOR: <span id="player-score">0</span>
                </div>
            </div>

            <div id="card-container" style="display:flex; flex-direction:column; align-items:center; gap:20px;">
                <!-- Sorular buraya JS ile basılacak -->
            </div>
        </div>
    </div>

    <!-- Result / Leaderboard Screen -->
    <div id="result-screen" class="screen">
        <div class="dashboard-content">
            <h2 class="gradient-text">En İyiler</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Sıralama</th><th>Oyuncu</th><th>Skor</th></tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>
            <button class="primary-btn" onclick="window.location.reload()" style="margin-top:20px;">Tekrar Oyna</button>
        </div>
    </div>

    <script type="module" src="js/app.js?v=2026.04.19.2"></script>
</body>
</html>
