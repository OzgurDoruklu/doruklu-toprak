<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toprak Doruklu - Bilgi Kartı Oyunu</title>
    <meta name="description" content="Eğlenceli Bilgi Kartı Oyunu">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.doruklu.com/style.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div id="alert-box" class="alert"></div>
    <div id="loading-spinner" class="loading-overlay">
        <div class="spinner"></div>
    </div>


    <!-- 2. GAME EKRANI -->
    <div id="game-screen" class="screen">
        <header class="dashboard-header" style="padding: 1rem 2rem;">
            <div style="display:flex; gap:1rem; align-items:center;">
                <button id="hub-back-btn" class="glass-btn" style="padding:0.5rem 1rem;">← Merkezi Sisteme Dön</button>
                <div class="sub-nav" style="display:flex; gap:0.5rem; margin-left:1rem; border-left:1px solid rgba(255,255,255,0.1); padding-left:1rem;">
                    <button onclick="window.ui.showScreen('game-screen')" class="glass-btn" style="padding:0.4rem 0.8rem; font-size:0.8rem;">🎮 Oyun</button>
                    <button onclick="window.ui.showScreen('result-screen')" class="glass-btn" style="padding:0.4rem 0.8rem; font-size:0.8rem;">🏆 Skorlar</button>
                </div>
            </div>
        </header>

        <div class="game-header" style="margin-top:1rem; background:rgba(255,255,255,0.03); border-radius:12px; padding:1rem 2rem;">
            <div>
                <span class="badge">Oyuncu</span>
                <span id="player-name">--</span>
            </div>
            <div class="score-box">
                Skor: <span id="player-score">0</span>
            </div>
        </div>

        <div id="card-container" class="container" style="background: none; box-shadow: none; border: none; align-items: center; display: flex; flex-direction: column;">
            <!-- Sorular buraya JS ile basılacak -->
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
